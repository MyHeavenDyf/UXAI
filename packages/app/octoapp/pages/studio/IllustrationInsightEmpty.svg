<svg viewBox="0 0 210 210" xmlns="http://www.w3.org/2000/svg" fill="none">
  <style>
    .d1 {
      transform-box: fill-box;
      transform-origin: center;
      animation: f1 2s ease-in-out infinite;
      opacity: 0.7;
    }
    .d2 {
      transform-box: fill-box;
      transform-origin: center;
      animation: f2 2s ease-in-out infinite 0.35s;
      opacity: 0.65;
    }
    .d3 {
      transform-box: fill-box;
      transform-origin: center;
      animation: f3 2s ease-in-out infinite 0.7s;
      opacity: 0.75;
    }
    .d4 {
      transform-box: fill-box;
      transform-origin: center;
      animation: f4 2s ease-in-out infinite 1.05s;
      opacity: 0.7;
    }
    @keyframes f1 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.7; }
      50%       { transform: translate(-3px, -8px) scale(1.12); opacity: 1; }
    }
    @keyframes f2 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.65; }
      50%       { transform: translate(-5px, -6px) scale(1.07); opacity: 1; }
    }
    @keyframes f3 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.75; }
      50%       { transform: translate(4px, -9px) scale(1.08); opacity: 1; }
    }
    @keyframes f4 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.7; }
      50%       { transform: translate(2px, 6px) scale(1.06); opacity: 1; }
    }
  </style>

  <!-- dot-1: small green, top-center -->
  <circle class="d1" cx="98" cy="74"  r="5"  fill="#5ecb6b" />
  <!-- dot-2: medium teal, left -->
  <circle class="d2" cx="72" cy="100" r="7"  fill="#45bcc9" />
  <!-- dot-3: large blue, right (biggest) -->
  <circle class="d3" cx="116" cy="98" r="11" fill="#2e9dfb" />
  <!-- dot-4: medium purple, bottom-center -->
  <circle class="d4" cx="93" cy="127" r="8"  fill="#7c5cef" />
</svg>
